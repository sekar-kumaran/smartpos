services:
  postgres:
    image: postgres:16-alpine
    container_name: smartpos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartpos}
      POSTGRES_USER: ${POSTGRES_USER:-smartpos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartpos_demo_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./devops/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartpos -d smartpos"]
      interval: 10s
      timeout: 5s
      retries: 6
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    container_name: smartpos-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 6
    mem_limit: 192m

  backend:
    image: smartpos-ai-backend:demo
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: smartpos-backend
    restart: unless-stopped
    environment:
      APP_ENV: development
      DEBUG: "false"
      WEB_CONCURRENCY: "1"
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "10"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smartpos}:${POSTGRES_PASSWORD:-smartpos_demo_password}@postgres:5432/${POSTGRES_DB:-smartpos}
      DATABASE_SYNC_URL: postgresql+psycopg2://${POSTGRES_USER:-smartpos}:${POSTGRES_PASSWORD:-smartpos_demo_password}@postgres:5432/${POSTGRES_DB:-smartpos}
      SQLITE_URL: sqlite+aiosqlite:///./smartpos_local.db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_URL: redis://redis:6379/2
      ALLOWED_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000","http://localhost:5173","http://127.0.0.1:5173"]'
      ALLOWED_HOSTS: '["*"]'
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/ready | grep -q '\"status\":\"ready\"'"]
      interval: 20s
      timeout: 8s
      start_period: 30s
      retries: 6
    mem_limit: 768m

  frontend:
    image: smartpos-ai-frontend:demo
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    container_name: smartpos-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 20s
      timeout: 5s
      start_period: 10s
      retries: 5
    mem_limit: 128m

  jenkins:
    image: smartpos-ai-jenkins:demo
    build:
      context: ./devops/jenkins
      dockerfile: Dockerfile
    container_name: smartpos-jenkins
    restart: unless-stopped
    user: root
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    ports:
      - "127.0.0.1:8081:8080"
      - "127.0.0.1:50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/login >/dev/null"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 10
    mem_limit: 1g

  celery-worker:
    image: smartpos-ai-backend:demo
    profiles: ["workers"]
    container_name: smartpos-celery-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smartpos}:${POSTGRES_PASSWORD:-smartpos_demo_password}@postgres:5432/${POSTGRES_DB:-smartpos}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_URL: redis://redis:6379/2
    command: celery -A app.tasks.celery_app worker --loglevel=warning --queues=default,notifications,sync,reports --concurrency=2
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping | grep -q pong"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 5
    mem_limit: 512m

  nginx:
    image: nginx:1.27-alpine
    profiles: ["edge"]
    container_name: smartpos-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./devops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  jenkins_home:

networks:
  default:
    name: smartpos-network
