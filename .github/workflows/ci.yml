name: SmartPOS AI – CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"

jobs:
  # ── Backend: lint + test ─────────────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-cov

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app/ --output-format=github

      - name: Run tests (SQLite in-memory, no Postgres required)
        working-directory: backend
        env:
          DATABASE_URL:       "sqlite+aiosqlite:///:memory:"
          SQLITE_URL:         "sqlite+aiosqlite:///:memory:"
          SECRET_KEY:         "ci-secret-key-not-for-prod"
          AES_ENCRYPTION_KEY: "ci-aes-key-not-for-prod"
          APP_ENV:            "test"
          REDIS_URL:          "redis://localhost:6379/0"
        run: |
          pytest tests/ -q \
            --tb=short \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.xml

  # ── Frontend: type-check + unit tests ────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: TypeScript type check
        working-directory: frontend
        run: npm run type-check

      - name: Unit tests (Jest)
        working-directory: frontend
        run: |
          npm test -- \
            --ci \
            --coverage \
            --coverageReporters=lcov,text \
            --reporters=default \
            --reporters=jest-junit \
            --outputFile=test-results.xml
        env:
          JEST_JUNIT_OUTPUT_DIR: .
          JEST_JUNIT_OUTPUT_NAME: test-results.xml

      - name: Upload frontend test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: frontend/test-results.xml

      - name: Build (Vite)
        working-directory: frontend
        run: npm run web:build

  # ── Docker build (main branch only) ──────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          target:     runtime
          push:       false
          tags:       smartpos-ai-community/backend:ci
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context:    ./frontend
          file:       ./frontend/Dockerfile
          target:     runtime
          push:       false
          tags:       smartpos-ai-community/frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
